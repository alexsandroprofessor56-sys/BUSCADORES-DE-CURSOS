<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Elite | Plataforma de Cursos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #050a0e; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="text-gray-200 min-h-screen">
    <nav class="border-b border-white/10 glass sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-cyan-500 text-black font-bold p-1 rounded text-xs">RE</div>
                <span class="text-xl font-bold tracking-tighter italic text-white uppercase">Radar<span class="text-cyan-400">Elite</span></span>
            </div>
            <div class="flex gap-6 text-sm font-medium">
                <a href="/" class="hover:text-cyan-400 transition">Início</a>
                {% if user.is_authenticated %}
                    <span class="text-gray-500">Olá, {{ user.username }}</span>
                    <a href="/logout" class="hover:text-red-400">Sair</a>
                {% else %}
                    <a href="/login" class="hover:text-cyan-400">Entrar</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-20">
        <h1 class="text-5xl font-bold text-white mb-8">Seus Cursos</h1>
        <!-- AQUI VAI A LISTA DE CURSOS QUE SÓ USUÁRIO VÊ -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            {% for curso in cursos %}
            <div class="glass p-6 rounded-2xl border border-white/5">
                <h3 class="font-bold text-cyan-400">{{ curso.nome }}</h3>
                <p class="text-sm text-gray-400">{{ curso.plataforma }}</p>
                <a href="{{ curso.link }}" class="mt-4 block bg-cyan-500 text-black text-center py-2 rounded-lg font-bold">ACESSAR CURSO</a>
            </div>
            {% endfor %}
        </div>
    </main>
</body>
</html>
