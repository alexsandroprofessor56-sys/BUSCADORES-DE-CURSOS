<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Radar Elite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body{font-family:'Inter',sans-serif;background:#05080c;background-image:radial-gradient(rgba(255,255,255,0.012) 1px,transparent 0);background-size:32px 32px}
    .glass{background:rgba(255,255,255,0.03);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.06);border-radius:12px;transition:all .3s}
    .glass:hover{border-color:rgba(34,211,238,0.2)}
    @keyframes orbFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
    @keyframes popIn{0%{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none}
    .orb:nth-child(1){width:400px;height:400px;background:#06b6d4;top:-150px;left:-100px;animation:orbFloat 8s ease-in-out infinite;opacity:.08}
    .orb:nth-child(2){width:300px;height:300px;background:#f59e0b;bottom:-100px;right:-80px;animation:orbFloat 10s ease-in-out infinite reverse;opacity:.06}
    .btn-press:active{transform:scale(.95)}
    .input-focus:focus{box-shadow:0 0 0 2px rgba(6,182,212,0.3)}
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6" style="font-family:'Inter',sans-serif">
  <div class="orb"></div><div class="orb"></div>
  <div class="w-full max-w-sm" style="animation:popIn .4s ease">
    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-cyan-300 via-cyan-400 to-cyan-600 flex items-center justify-center text-black font-black text-xl mx-auto mb-4 shadow-lg shadow-cyan-500/20">RE</div>
      <h1 class="text-2xl font-bold text-white">Painel Admin</h1>
      <p class="text-gray-500 text-sm mt-1">Radar Elite</p>
    </div>
    <form method="POST" class="glass rounded-2xl p-6 space-y-4" style="animation:slideUp .5s ease .1s both">
      {% if erro %}
      <div class="flex items-center gap-2 bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-3 rounded-xl"><i class="fas fa-exclamation-circle"></i> {{ erro }}</div>
      {% endif %}
      <div>
        <label class="text-xs text-gray-500 uppercase tracking-wider font-semibold flex items-center gap-1"><i class="fas fa-user"></i> Usuário</label>
        <input type="text" name="username" required
          class="input-focus w-full mt-1.5 px-4 py-3 bg-[#05080c] border border-white/10 rounded-xl text-white outline-none focus:border-cyan-500 transition placeholder-gray-600"
          placeholder="admin">
      </div>
      <div>
        <label class="text-xs text-gray-500 uppercase tracking-wider font-semibold flex items-center gap-1"><i class="fas fa-lock"></i> Senha</label>
        <input type="password" name="password" required
          class="input-focus w-full mt-1.5 px-4 py-3 bg-[#05080c] border border-white/10 rounded-xl text-white outline-none focus:border-cyan-500 transition placeholder-gray-600"
          placeholder="********">
      </div>
      <div id="otpField" style="display:none">
        <label class="text-xs text-gray-500 uppercase tracking-wider font-semibold flex items-center gap-1"><i class="fas fa-shield-halved"></i> Código 2FA</label>
        <input type="text" name="otp_code" placeholder="000000"
          class="input-focus w-full mt-1.5 px-4 py-3 bg-[#05080c] border border-white/10 rounded-xl text-white outline-none focus:border-cyan-500 transition text-center tracking-widest placeholder-gray-600">
      </div>
      <button type="submit" class="btn-press w-full py-3 bg-gradient-to-r from-cyan-400 to-cyan-600 hover:from-cyan-300 hover:to-cyan-500 text-black font-bold rounded-xl transition-all shadow-lg shadow-cyan-500/20 flex items-center justify-center gap-2">
        <i class="fas fa-arrow-right"></i> Entrar
      </button>
    </form>
  </div>
  <script>
    fetch('/api/check_2fa').then(r=>r.json()).then(d=>{ if(d.otp_enabled) document.getElementById('otpField').style.display='block'; });
  </script>
</body>
</html>
