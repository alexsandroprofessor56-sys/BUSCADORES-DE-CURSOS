<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Radar Elite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#05080c;color:#e5e7eb;overflow:hidden;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .noise{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:256px 256px}
    .glass{background:rgba(255,255,255,0.02);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border:1px solid rgba(255,255,255,0.06);border-radius:16px;transition:all .4s cubic-bezier(.22,1,.36,1)}
    @keyframes orbFloat{0%,100%{transform:translateY(0)}33%{transform:translateY(-15px)}66%{transform:translateY(8px)}}
    @keyframes popIn{0%{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
    .orb:nth-child(1){width:400px;height:400px;background:#06b6d4;top:-120px;left:-80px;animation:orbFloat 12s ease-in-out infinite;opacity:.07}
    .orb:nth-child(2){width:300px;height:300px;background:#f59e0b;bottom:-80px;right:-60px;animation:orbFloat 15s ease-in-out infinite reverse;opacity:.05}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:12px;font-weight:700;font-size:14px;transition:all .3s cubic-bezier(.22,1,.36,1);cursor:pointer;border:none;width:100%;justify-content:center}
    .btn:active{transform:scale(.96)}
    .btn-primary{background:linear-gradient(135deg,#22d3ee,#06b6d4);color:#000;box-shadow:0 4px 20px rgba(6,182,212,.25)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(6,182,212,.35)}
    .input-elite{width:100%;padding:14px 18px;border-radius:12px;background:#05080c;border:1px solid rgba(255,255,255,0.08);color:#fff;font-size:15px;outline:none;transition:all .3s}
    .input-elite:focus{border-color:rgba(6,182,212,.4);box-shadow:0 0 0 3px rgba(6,182,212,.1)}
    .input-elite::placeholder{color:#4b5563}
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="orb"></div><div class="orb"></div>
  <div class="w-full max-w-sm relative z-10" style="animation:popIn .45s cubic-bezier(.22,1,.36,1)">
    <div class="text-center mb-8" style="animation:slideUp .5s ease">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-cyan-300 via-cyan-400 to-cyan-600 flex items-center justify-center text-black font-black text-xl mx-auto mb-4 shadow-lg shadow-cyan-500/20">RE</div>
      <h1 class="text-2xl font-bold text-white tracking-tight">Painel Admin</h1>
      <p class="text-gray-500 text-sm mt-1">Radar Elite</p>
    </div>
    <form method="POST" class="glass rounded-2xl p-6 sm:p-7 space-y-4 sm:space-y-5" style="animation:slideUp .5s ease .1s both">
      {% if erro %}
      <div class="flex items-center gap-2 bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-3.5 rounded-xl"><i class="fas fa-exclamation-circle"></i> {{ erro }}</div>
      {% endif %}
      <div style="position:absolute;left:-9999px;opacity:0" aria-hidden="true">
        <input type="text" name="_hp" tabindex="-1" autocomplete="off">
      </div>
      <div>
        <label class="text-[11px] text-gray-500 uppercase tracking-widest font-semibold flex items-center gap-1.5 mb-1.5"><i class="fas fa-user text-[10px]"></i> Usuário</label>
        <input type="text" name="username" required class="input-elite" placeholder="admin">
      </div>
      <div>
        <label class="text-[11px] text-gray-500 uppercase tracking-widest font-semibold flex items-center gap-1.5 mb-1.5"><i class="fas fa-lock text-[10px]"></i> Senha</label>
        <input type="password" name="password" required class="input-elite" placeholder="********">
      </div>
      <div id="otpField" style="display:none">
        <label class="text-[11px] text-gray-500 uppercase tracking-widest font-semibold flex items-center gap-1.5 mb-1.5"><i class="fas fa-shield-halved text-[10px]"></i> Código 2FA</label>
        <input type="text" name="otp_code" placeholder="000000" class="input-elite text-center tracking-[.3em]">
      </div>
      <button type="submit" class="btn btn-primary"><i class="fas fa-arrow-right"></i> Entrar</button>
    </form>
  </div>
  <script>fetch('/api/check_2fa').then(r=>r.json()).then(d=>{if(d.otp_enabled)document.getElementById('otpField').style.display='block'})</script>
</body>
</html>
