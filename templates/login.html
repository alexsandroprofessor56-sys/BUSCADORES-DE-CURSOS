<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Radar Elite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #05080c; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="w-12 h-12 rounded-xl bg-cyan-500 flex items-center justify-center text-black font-bold text-lg mx-auto mb-3">RE</div>
      <h1 class="text-2xl font-bold text-white">Painel Admin</h1>
      <p class="text-gray-500 text-sm">Radar Elite</p>
    </div>
    <form method="POST" class="bg-[#0a0f16] border border-white/10 rounded-2xl p-6 space-y-4">
      {% if erro %}
      <div class="bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-3 rounded-lg">{{ erro }}</div>
      {% endif %}
      <div>
        <label class="text-xs text-gray-500 uppercase tracking-wider">Usuário</label>
        <input type="text" name="username" required
          class="w-full mt-1 px-4 py-3 bg-[#05080c] border border-white/10 rounded-xl text-white outline-none focus:border-cyan-500 transition">
      </div>
      <div>
        <label class="text-xs text-gray-500 uppercase tracking-wider">Senha</label>
        <input type="password" name="password" required
          class="w-full mt-1 px-4 py-3 bg-[#05080c] border border-white/10 rounded-xl text-white outline-none focus:border-cyan-500 transition">
      </div>
      <div id="otpField" style="display:none">
        <label class="text-xs text-gray-500 uppercase tracking-wider">Código 2FA</label>
        <input type="text" name="otp_code" placeholder="000000"
          class="w-full mt-1 px-4 py-3 bg-[#05080c] border border-white/10 rounded-xl text-white outline-none focus:border-cyan-500 transition">
      </div>
      <button type="submit" class="w-full py-3 bg-cyan-500 hover:bg-cyan-600 text-black font-bold rounded-xl transition">
        Entrar
      </button>
    </form>
  </div>
</body>
</html>
