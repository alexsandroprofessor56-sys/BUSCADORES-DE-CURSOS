<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar - Radar Elite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: #05080c; }
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); }
    .btn-google { transition: all 0.3s; }
    .btn-google:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,255,255,0.1); }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; }
    .orb:nth-child(1) { width: 400px; height: 400px; background: #06b6d4; top: -150px; left: -100px; animation: float 8s ease-in-out infinite; opacity: .08; }
    .orb:nth-child(2) { width: 300px; height: 300px; background: #f59e0b; bottom: -100px; right: -80px; animation: float 10s ease-in-out infinite reverse; opacity: .06; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
  <div class="orb"></div><div class="orb"></div>
  <div class="w-full max-w-sm text-center relative">
    <div class="mb-8">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-cyan-300 via-cyan-400 to-cyan-600 flex items-center justify-center text-black font-black text-2xl mx-auto mb-4 shadow-lg shadow-cyan-500/20">RE</div>
      <h1 class="text-3xl font-bold text-white">Radar<span class="text-cyan-400">Elite</span></h1>
      <p class="text-gray-500 mt-2">Entre para favoritar cursos</p>
    </div>
    <div class="glass rounded-2xl p-8">
      {% if google_ready %}
      <a href="{{ google_login_url }}"
        class="btn-google inline-flex items-center gap-3 px-8 py-4 bg-white hover:bg-gray-100 text-gray-800 font-bold rounded-2xl transition shadow-lg w-full justify-center">
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Entrar com Google
      </a>
      {% else %}
      <div class="bg-amber-500/10 border border-amber-500/20 text-amber-400 p-5 rounded-xl text-sm flex items-center gap-2">
        <i class="fas fa-exclamation-triangle"></i> Login Google não configurado
      </div>
      {% endif %}
    </div>
    <p class="mt-6">
      <a href="/" class="text-gray-600 hover:text-cyan-400 transition text-sm flex items-center justify-center gap-1"><i class="fas fa-arrow-left"></i> Voltar aos cursos</a>
    </p>
  </div>
</body>
</html>
