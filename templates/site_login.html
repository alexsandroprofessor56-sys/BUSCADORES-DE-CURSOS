<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Radar Elite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Inter',sans-serif;
      background:#030508;
      color:#e5e7eb;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      overflow:hidden;
      position:relative
    }
    .noise{
      position:fixed;inset:0;pointer-events:none;z-index:0;
      opacity:.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat:repeat;background-size:256px 256px
    }
    .bg-grid{
      position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:
        linear-gradient(rgba(6,182,212,.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(6,182,212,.03) 1px,transparent 1px);
      background-size:60px 60px
    }
    .orb{
      position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;
      transition:transform 8s ease
    }
    .orb-1{width:500px;height:500px;background:#06b6d4;top:-200px;left:-150px;opacity:.06;animation:orbit1 14s ease-in-out infinite}
    .orb-2{width:400px;height:400px;background:#8b5cf6;bottom:-150px;right:-100px;opacity:.05;animation:orbit2 18s ease-in-out infinite}
    .orb-3{width:300px;height:300px;background:#f59e0b;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.04;animation:orbit3 20s ease-in-out infinite}
    @keyframes orbit1{
      0%,100%{transform:translate(0,0) scale(1)}
      25%{transform:translate(60px,-40px) scale(1.05)}
      50%{transform:translate(-20px,30px) scale(.95)}
      75%{transform:translate(40px,20px) scale(1.02)}
    }
    @keyframes orbit2{
      0%,100%{transform:translate(0,0) scale(1)}
      33%{transform:translate(-50px,-30px) scale(1.03)}
      66%{transform:translate(30px,50px) scale(.97)}
    }
    @keyframes orbit3{
      0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.04}
      50%{transform:translate(-50%,-50%) scale(1.3);opacity:.06}
    }
    .glass{
      background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.01) 100%);
      backdrop-filter:blur(24px) saturate(1.4);
      -webkit-backdrop-filter:blur(24px) saturate(1.4);
      border:1px solid rgba(255,255,255,.06);
      border-radius:20px;
      box-shadow:
        0 0 0 1px rgba(6,182,212,.05),
        0 20px 60px rgba(0,0,0,.4),
        0 0 80px rgba(6,182,212,.03);
      transition:all .5s cubic-bezier(.22,1,.36,1)
    }
    .glass:hover{
      box-shadow:
        0 0 0 1px rgba(6,182,212,.08),
        0 30px 80px rgba(0,0,0,.5),
        0 0 120px rgba(6,182,212,.05);
      border-color:rgba(6,182,212,.1)
    }
    .glow-input{
      width:100%;
      padding:14px 16px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      border-radius:12px;
      color:#fff;
      font-size:14px;
      font-family:'Inter',sans-serif;
      outline:none;
      transition:all .3s cubic-bezier(.22,1,.36,1)
    }
    .glow-input:focus{
      border-color:rgba(6,182,212,.3);
      box-shadow:
        0 0 0 3px rgba(6,182,212,.06),
        0 0 30px rgba(6,182,212,.04);
      background:rgba(255,255,255,.05)
    }
    .glow-input::placeholder{color:rgba(255,255,255,.2)}
    .glow-input:hover{border-color:rgba(255,255,255,.1)}
    .btn{
      display:inline-flex;align-items:center;gap:10px;
      padding:14px 28px;border-radius:12px;
      font-weight:700;font-size:14px;
      transition:all .3s cubic-bezier(.22,1,.36,1);
      cursor:pointer;border:none;width:100%;justify-content:center;
      position:relative;overflow:hidden
    }
    .btn:active{transform:scale(.97)}
    .btn-primary{
      background:linear-gradient(135deg,#06b6d4,#0891b2);
      color:#fff;
      box-shadow:0 4px 20px rgba(6,182,212,.25)
    }
    .btn-primary:hover{
      transform:translateY(-2px);
      box-shadow:0 8px 30px rgba(6,182,212,.35)
    }
    .btn-google{
      background:rgba(255,255,255,.95);
      color:#1f2937;
      box-shadow:0 4px 20px rgba(0,0,0,.15)
    }
    .btn-google:hover{
      transform:translateY(-2px);
      box-shadow:0 8px 30px rgba(0,0,0,.25)
    }
    .divider{
      display:flex;align-items:center;gap:16px;
      color:rgba(255,255,255,.15);font-size:12px;font-weight:500;
      text-transform:uppercase;letter-spacing:1px
    }
    .divider::before,.divider::after{
      content:'';flex:1;height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
    .anim-1{animation:fadeIn .6s cubic-bezier(.22,1,.36,1) both}
    .anim-2{animation:fadeIn .6s cubic-bezier(.22,1,.36,1) .1s both}
    .anim-3{animation:fadeIn .6s cubic-bezier(.22,1,.36,1) .2s both}
    .anim-4{animation:fadeIn .6s cubic-bezier(.22,1,.36,1) .3s both}
    .anim-5{animation:fadeIn .6s cubic-bezier(.22,1,.36,1) .4s both}
    .shimmer{
      position:absolute;inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);
      background-size:200% 100%;
      animation:shimmer 3s ease-in-out infinite
    }
    @keyframes shimmer{0%,100%{background-position:-200% 0}50%{background-position:200% 0}}
    .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.2);font-size:14px;pointer-events:none;transition:color .3s}
    .input-wrap:focus-within .input-icon{color:rgba(6,182,212,.5)}
    .logo-glow{
      width:60px;height:60px;border-radius:16px;
      background:linear-gradient(135deg,#06b6d4,#0891b2,#0e7490);
      display:flex;align-items:center;justify-content:center;
      font-weight:900;font-size:22px;color:#fff;
      margin:0 auto;
      box-shadow:
        0 0 0 1px rgba(6,182,212,.2),
        0 10px 40px rgba(6,182,212,.2),
        0 0 60px rgba(6,182,212,.08);
      animation:scaleIn .5s cubic-bezier(.22,1,.36,1) both;
      position:relative
    }
    .logo-glow::after{
      content:'';position:absolute;inset:-4px;border-radius:20px;
      background:linear-gradient(135deg,#06b6d4,#8b5cf6);
      opacity:.15;z-index:-1;filter:blur(12px)
    }
    .input-wrap{position:relative;margin-bottom:4px}
    .error-msg{
      background:rgba(239,68,68,.08);
      border:1px solid rgba(239,68,68,.15);
      color:#fca5a5;
      padding:12px 16px;
      border-radius:12px;
      font-size:13px;
      display:flex;
      align-items:center;
      gap:10px
    }
    .eye-btn{
      position:absolute;right:14px;top:50%;transform:translateY(-50%);
      background:none;border:none;color:rgba(255,255,255,.2);cursor:pointer;
      font-size:14px;transition:color .3s;padding:4px
    }
    .eye-btn:hover{color:rgba(255,255,255,.4)}
    .register-text{
      color:rgba(255,255,255,.25);font-size:12px;text-align:center;margin-top:8px
    }
    .register-text span{color:rgba(6,182,212,.5);font-weight:600}
    @media(max-width:480px){
      body{padding:16px}
      .glass{padding:28px 20px!important;border-radius:16px}
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="w-full max-w-[420px] relative z-10">
    <div class="glass p-8 sm:p-10">
      <div class="text-center mb-8 anim-1">
        <div class="logo-glow">RE</div>
        <h1 class="text-2xl font-bold text-white mt-5 tracking-tight">Radar<span class="text-cyan-400">Elite</span></h1>
        <p class="text-gray-600 text-sm mt-2">Entre para explorar os melhores cursos</p>
      </div>

      {% if erro %}
      <div class="error-msg anim-2" role="alert">
        <i class="fas fa-exclamation-circle flex-shrink-0"></i>
        <span>{{ erro }}</span>
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('admin_bp.public_login') }}" class="space-y-4">
        <div class="anim-3">
          <label class="text-gray-500 text-xs font-semibold uppercase tracking-wider block mb-2">Email</label>
          <div class="input-wrap">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" name="email" class="glow-input" style="padding-left:42px" placeholder="seu@email.com" required autofocus>
          </div>
        </div>
        <div class="anim-4">
          <label class="text-gray-500 text-xs font-semibold uppercase tracking-wider block mb-2">Senha</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" name="password" id="password" class="glow-input" style="padding-left:42px;padding-right:42px" placeholder="Sua senha" required minlength="4">
            <button type="button" class="eye-btn" onclick="togglePass()" tabindex="-1" aria-label="Mostrar senha">
              <i id="eyeIcon" class="fas fa-eye"></i>
            </button>
          </div>
          <p class="register-text anim-5">Novo? Sua conta será criada automaticamente <span>⚡</span></p>
        </div>
        <button type="submit" class="btn btn-primary anim-5">
          <i class="fas fa-arrow-right-to-bracket"></i>
          Entrar
          <div class="shimmer"></div>
        </button>
      </form>

      {% if google_ready %}
      <div class="divider my-6 anim-5">ou</div>
      <a href="{{ google_login_url }}" class="btn btn-google anim-5">
        <i class="fab fa-google text-lg"></i>
        Continuar com Google
      </a>
      {% endif %}
    </div>

    <p class="text-center mt-6 anim-5">
      <a href="/" class="text-gray-700 hover:text-cyan-400 transition-all text-xs flex items-center justify-center gap-2 group">
        <i class="fas fa-compass text-[10px] group-hover:rotate-45 transition-transform"></i>
        Explorar como visitante
      </a>
    </p>
  </div>

  <script>
    function togglePass(){
      const p=document.getElementById('password');
      const i=document.getElementById('eyeIcon');
      if(p.type==='password'){p.type='text';i.className='fas fa-eye-slash'}
      else{p.type='password';i.className='fas fa-eye'}
    }
    document.querySelectorAll('.glow-input').forEach(el=>{
      el.addEventListener('focus',function(){
        this.closest('.input-wrap').querySelector('.input-icon').style.color='rgba(6,182,212,.5)'
      })
      el.addEventListener('blur',function(){
        if(!this.value) this.closest('.input-wrap').querySelector('.input-icon').style.color='rgba(255,255,255,.2)'
      })
    })
  </script>
</body>
</html>
