<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Radar Elite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#05080c;color:#e5e7eb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .noise{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:256px 256px}
    .glass{background:rgba(255,255,255,0.02);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border:1px solid rgba(255,255,255,0.06);border-radius:16px;transition:all .4s cubic-bezier(.22,1,.36,1)}
    @keyframes float{0%,100%{transform:translateY(0)}33%{transform:translateY(-15px)}66%{transform:translateY(8px)}}
    @keyframes popIn{0%{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
    .orb:nth-child(1){width:400px;height:400px;background:#06b6d4;top:-120px;left:-80px;animation:float 12s ease-in-out infinite;opacity:.07}
    .orb:nth-child(2){width:300px;height:300px;background:#f59e0b;bottom:-80px;right:-60px;animation:float 15s ease-in-out infinite reverse;opacity:.05}
    .btn{display:inline-flex;align-items:center;gap:10px;padding:16px 32px;border-radius:14px;font-weight:700;font-size:15px;transition:all .3s cubic-bezier(.22,1,.36,1);cursor:pointer;border:none;width:100%;justify-content:center}
    .btn:active{transform:scale(.96)}
    .btn-google{background:#fff;color:#1f2937}
    .btn-google:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(255,255,255,.12)}
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="orb"></div><div class="orb"></div>
  <div class="w-full max-w-sm text-center relative z-10" style="animation:popIn .45s cubic-bezier(.22,1,.36,1)">
    <div class="mb-8" style="animation:slideUp .5s ease">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-cyan-300 via-cyan-400 to-cyan-600 flex items-center justify-center text-black font-black text-2xl mx-auto mb-4 shadow-lg shadow-cyan-500/20">RE</div>
      <h1 class="text-3xl font-bold text-white tracking-tight">Radar<span class="text-cyan-400">Elite</span></h1>
      <p class="text-gray-500 mt-2">Entre para favoritar cursos</p>
    </div>
    <div class="glass rounded-2xl p-7 sm:p-8" style="animation:slideUp .5s ease .1s both">
      {% if google_ready %}
      <a href="{{ google_login_url }}" class="btn btn-google"><i class="fab fa-google text-lg"></i> Entrar com Google</a>
      {% else %}
      <div class="flex items-center gap-3 bg-amber-500/10 border border-amber-500/20 text-amber-400 p-4 rounded-xl text-sm"><i class="fas fa-exclamation-triangle"></i> Login Google não configurado</div>
      {% endif %}
    </div>
    <p class="mt-6" style="animation:slideUp .5s ease .2s both">
      <a href="/" class="text-gray-600 hover:text-cyan-400 transition text-sm flex items-center justify-center gap-1.5"><i class="fas fa-arrow-left text-xs"></i> Voltar aos cursos</a>
    </p>
  </div>
</body>
</html>
