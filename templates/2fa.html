<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2FA - Radar Elite</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-6" style="background:#05080c;font-family:'Inter',sans-serif">
  <div class="w-full max-w-sm bg-[#0a0f16] border border-white/10 rounded-2xl p-6">
    <h1 class="text-xl font-bold text-white mb-2">Autenticação 2FA</h1>
    <p class="text-gray-500 text-sm mb-6">Escaneie o QR code no Google Authenticator</p>
    {% if erro %}
    <div class="bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-3 rounded-lg mb-4">{{ erro }}</div>
    {% endif %}
    {% if uri %}
    <div class="bg-white p-4 rounded-xl mb-4 flex justify-center">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data={{ uri | urlencode }}" alt="QR Code 2FA" class="w-44 h-44">
    </div>
    <div class="mb-4">
      <p class="text-xs text-gray-500 uppercase mb-1">Ou digite o código manualmente:</p>
      <code class="block bg-[#05080c] p-3 rounded-lg text-cyan-400 text-sm break-all">{{ secret }}</code>
    </div>
    {% endif %}
    <form method="POST">
      <div>
        <label class="text-xs text-gray-500 uppercase tracking-wider">Código 2FA</label>
        <input type="text" name="otp_code" placeholder="000000" required
          class="w-full mt-1 px-4 py-3 bg-[#05080c] border border-white/10 rounded-xl text-white outline-none focus:border-cyan-500 transition text-center text-2xl tracking-widest">
      </div>
      <button type="submit" class="w-full mt-4 py-3 bg-cyan-500 hover:bg-cyan-600 text-black font-bold rounded-xl transition">
        Ativar 2FA
      </button>
    </form>
  </div>
</body>
</html>
