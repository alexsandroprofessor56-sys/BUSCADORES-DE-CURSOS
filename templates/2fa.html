<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2FA — Radar Elite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#05080c;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .noise{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:256px 256px}
    .glass{background:rgba(255,255,255,0.02);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border:1px solid rgba(255,255,255,0.06);border-radius:16px;transition:all .4s cubic-bezier(.22,1,.36,1)}
    @keyframes orbFloat{0%,100%{transform:translateY(0)}33%{transform:translateY(-15px)}66%{transform:translateY(8px)}}
    @keyframes popIn{0%{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
    .orb:nth-child(1){width:400px;height:400px;background:#06b6d4;top:-120px;left:-80px;animation:orbFloat 12s ease-in-out infinite;opacity:.07}
    .orb:nth-child(2){width:300px;height:300px;background:#f59e0b;bottom:-80px;right:-60px;animation:orbFloat 15s ease-in-out infinite reverse;opacity:.05}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:12px;font-weight:700;font-size:14px;transition:all .3s cubic-bezier(.22,1,.36,1);cursor:pointer;border:none;width:100%;justify-content:center}
    .btn:active{transform:scale(.96)}
    .btn-primary{background:linear-gradient(135deg,#22d3ee,#06b6d4);color:#000;box-shadow:0 4px 20px rgba(6,182,212,.25)}
    .btn-primary:hover{box-shadow:0 8px 30px rgba(6,182,212,.35)}
    .input-elite{width:100%;padding:14px 18px;border-radius:12px;background:#05080c;border:1px solid rgba(255,255,255,0.08);color:#fff;font-size:15px;outline:none;transition:all .3s;text-align:center;font-size:24px;letter-spacing:.4em}
    .input-elite:focus{border-color:rgba(6,182,212,.4);box-shadow:0 0 0 3px rgba(6,182,212,.1)}
    .input-elite::placeholder{font-size:16px;letter-spacing:normal;color:#4b5563}
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="orb"></div><div class="orb"></div>
  <div class="w-full max-w-sm glass rounded-2xl p-6 sm:p-7 relative z-10" style="animation:popIn .45s cubic-bezier(.22,1,.36,1)">
    <div class="text-center mb-6">
      <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-cyan-300 via-cyan-400 to-cyan-600 flex items-center justify-center text-black font-black text-lg mx-auto mb-3 shadow-lg shadow-cyan-500/20">RE</div>
      <h1 class="text-xl font-bold text-white tracking-tight">Autenticação 2FA</h1>
      <p class="text-gray-500 text-sm mt-1">Escaneie o QR code no Google Authenticator</p>
    </div>
    {% if erro %}
    <div class="flex items-center gap-2 bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-3.5 rounded-xl mb-4"><i class="fas fa-exclamation-circle"></i> {{ erro }}</div>
    {% endif %}
    {% if uri %}
    <div class="bg-white p-4 rounded-xl mb-4 flex justify-center" style="animation:slideUp .4s ease"><img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data={{ uri | urlencode }}" alt="QR Code 2FA" class="w-40 h-40"></div>
    <div class="mb-4" style="animation:slideUp .4s ease .1s both">
      <p class="text-[11px] text-gray-500 uppercase tracking-widest font-semibold mb-1.5 flex items-center gap-1.5"><i class="fas fa-key"></i> Ou digite o código:</p>
      <code class="block bg-[#05080c] p-3 rounded-xl text-cyan-400 text-sm break-all border border-white/5">{{ secret }}</code>
    </div>
    {% endif %}
    <form method="POST" style="animation:slideUp .4s ease .2s both">
      <div>
        <label class="text-[11px] text-gray-500 uppercase tracking-widest font-semibold flex items-center gap-1.5 mb-1.5"><i class="fas fa-shield-halved"></i> Código 2FA</label>
        <input type="text" name="otp_code" placeholder="000000" required class="input-elite">
      </div>
      <button type="submit" class="btn btn-primary mt-5"><i class="fas fa-check"></i> Ativar 2FA</button>
    </form>
  </div>
</body>
</html>
