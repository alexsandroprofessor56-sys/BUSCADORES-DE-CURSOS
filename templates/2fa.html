<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2FA - Radar Elite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body{font-family:'Inter',sans-serif;background:#05080c;background-image:radial-gradient(rgba(255,255,255,0.012) 1px,transparent 0);background-size:32px 32px}
    .glass{background:rgba(255,255,255,0.03);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.06);border-radius:12px;transition:all .3s}
    @keyframes orbFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
    @keyframes popIn{0%{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none}
    .orb:nth-child(1){width:400px;height:400px;background:#06b6d4;top:-150px;left:-100px;animation:orbFloat 8s ease-in-out infinite;opacity:.08}
    .orb:nth-child(2){width:300px;height:300px;background:#f59e0b;bottom:-100px;right:-80px;animation:orbFloat 10s ease-in-out infinite reverse;opacity:.06}
    .btn-press:active{transform:scale(.95)}
    .input-focus:focus{box-shadow:0 0 0 2px rgba(6,182,212,0.3)}
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
  <div class="orb"></div><div class="orb"></div>
  <div class="w-full max-w-sm glass rounded-2xl p-6" style="animation:popIn .4s ease">
    <div class="text-center mb-6">
      <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-cyan-300 via-cyan-400 to-cyan-600 flex items-center justify-center text-black font-black text-lg mx-auto mb-3 shadow-lg shadow-cyan-500/20">RE</div>
      <h1 class="text-xl font-bold text-white">Autenticação 2FA</h1>
      <p class="text-gray-500 text-sm mt-1">Escaneie o QR code no Google Authenticator</p>
    </div>
    {% if erro %}
    <div class="flex items-center gap-2 bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-3 rounded-xl mb-4"><i class="fas fa-exclamation-circle"></i> {{ erro }}</div>
    {% endif %}
    {% if uri %}
    <div class="bg-white p-4 rounded-xl mb-4 flex justify-center" style="animation:slideUp .4s ease">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data={{ uri | urlencode }}" alt="QR Code 2FA" class="w-44 h-44">
    </div>
    <div class="mb-4" style="animation:slideUp .4s ease .1s both">
      <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-1 flex items-center gap-1"><i class="fas fa-key"></i> Ou digite o código:</p>
      <code class="block bg-[#05080c] p-3 rounded-lg text-cyan-400 text-sm break-all border border-white/5">{{ secret }}</code>
    </div>
    {% endif %}
    <form method="POST" style="animation:slideUp .4s ease .2s both">
      <div>
        <label class="text-xs text-gray-500 uppercase tracking-wider font-semibold flex items-center gap-1"><i class="fas fa-shield-halved"></i> Código 2FA</label>
        <input type="text" name="otp_code" placeholder="000000" required
          class="input-focus w-full mt-1.5 px-4 py-3 bg-[#05080c] border border-white/10 rounded-xl text-white outline-none focus:border-cyan-500 transition text-center text-2xl tracking-[0.5em] placeholder:text-base placeholder:tracking-normal placeholder-gray-600">
      </div>
      <button type="submit" class="btn-press w-full mt-5 py-3 bg-gradient-to-r from-cyan-400 to-cyan-600 hover:from-cyan-300 hover:to-cyan-500 text-black font-bold rounded-xl transition-all shadow-lg shadow-cyan-500/20 flex items-center justify-center gap-2">
        <i class="fas fa-check"></i> Ativar 2FA
      </button>
    </form>
  </div>
</body>
</html>
